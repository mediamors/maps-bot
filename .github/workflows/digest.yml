name: Maps Bot
on:
  workflow_dispatch:
  schedule:
    # 07:20 МСК = 04:20 UTC (Вторник)
    # Используем :23 минуты вместо :20, чтобы обойти общую очередь
    - cron: '23 9 * * 3'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - run: pip install feedparser requests
    
    - name: Send Header
      run: python bot.py HEADER
      
    - name: Marketing
      run: python bot.py MARKETING
      
    - name: Russia
      run: python bot.py RU
      
    - name: World
      run: python bot.py WORLD
