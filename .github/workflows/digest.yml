name: Maps Digest Sender

on:
  workflow_dispatch:
  schedule:
    # Четверг в 10:00 по Москве (Москва = UTC+3, поэтому 10 - 3 = 7 по Гринвичу)
    - cron: '0 7 * * 4'
    # Суббота в 14:00 по Москве (14 - 3 = 11 по Гринвичу)
    - cron: '0 11 * * 6'

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Код из репозитория
        uses: actions/checkout@v3

      - name: Установка Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Установка библиотек
        run: pip install feedparser requests

      - name: Запуск дайджеста РФ
        if: github.event.schedule == '0 7 * * 4'
        run: python bot.py RU

      - name: Запуск дайджеста МИР
        if: github.event.schedule == '0 11 * * 6'
        run: python bot.py WORLD
