name: Main Scoring Bot
on:
  workflow_dispatch:
  schedule:
    # 07:00 МСК = 04:00 UTC (Вторник)
    # Используем :04 минуты вместо :00 для более быстрого старта
    - cron: '4 4 * * 2'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - run: pip install feedparser requests
    
    - name: Send Header
      run: python main.py HEADER
      
    - name: Marketing
      run: python main.py MARKETING
      
    - name: Russia
      run: python main.py RU
      
    - name: World
      run: python main.py WORLD
