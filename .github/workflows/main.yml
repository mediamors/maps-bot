name: Main Scoring Bot
on:
  workflow_dispatch:
  schedule:
    # 15:00 МСК = 12:00 UTC
    - cron: '0 12 * * 1'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - run: pip install feedparser requests
    
    - name: Send Header
      if: github.event.schedule == '0 12 * * 1' || github.event_name == 'workflow_dispatch'
      run: python main.py HEADER
      
    - name: Marketing
      if: github.event.schedule == '0 12 * * 1' || github.event_name == 'workflow_dispatch'
      run: python main.py MARKETING
      
    - name: Russia
      if: github.event.schedule == '0 12 * * 1' || github.event_name == 'workflow_dispatch'
      run: python main.py RU
      
    - name: World
      if: github.event.schedule == '0 12 * * 1' || github.event_name == 'workflow_dispatch'
      run: python main.py WORLD
